services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    ports:
      - "5001:5000"
    command: >
      mlflow server 
      --backend-store-uri sqlite:////app/mlflow.db 
      --default-artifact-root /app/artifacts 
      --host 0.0.0.0
    volumes:
      - ./mlflow_data:/app
    restart: always

  backend-api:
    build: .
    container_name: health_backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DOCKER_ENV=true
    depends_on:
      - mlflow
    restart: always

  notifier:
    build: .
    container_name: health_notifier
    # 🟢 เพิ่มการรอเป็น 30 วิ เพื่อให้ Server ตัวจริงตื่นเต็มที่ก่อนเริ่มรัน Python
    command: >
      bash -c "
      prefect server start --host 0.0.0.0 --port 4200 &
      sleep 30 &&
      python daily_reminder.py
      "
    env_file: .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PREFECT_API_URL=http://127.0.0.1:4200/api
      - PREFECT_HOME=/root/.prefect
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Bangkok
    volumes:
      - .:/app
      - prefect_storage:/root/.prefect
    depends_on:
      - backend-api
    restart: always

  frontend:
    build: .
    container_name: health_frontend
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "frontend/ui.py", "--server.port=8501", "--server.address=0.0.0.0"]
    env_file: .env
    environment:
      - BACKEND_URL=http://backend-api:8080
    depends_on:
      - backend-api
    restart: always

volumes:
  prefect_storage: