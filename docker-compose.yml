version: '3.8'

services:
  # 📊 MLflow Tracking Server (เก็บบันทึกการทดลองและ Prompt)
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    ports:
      - "5000:5000"
    command: >
      mlflow server 
      --backend-store-uri sqlite:////app/mlflow.db 
      --default-artifact-root /app/artifacts 
      --host 0.0.0.0
    volumes:
      # 🟢 สำคัญ: บรรทัดนี้ทำให้ข้อมูลการทดลองและเวอร์ชัน Prompt ไม่หายแม้จะรันใหม่
      - ./mlflow_data:/app
    restart: always

  # 🌐 Backend: FastAPI (คุยกับ MongoDB Cloud และ MLflow)
  backend-api:
    build: .
    container_name: health_backend
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - mlflow
    restart: always

  # 🔔 Notifier: ระบบแจ้งเตือนพยาบาลผ่าน LINE (Prefect Daily Flow)
  notifier:
    build: .
    container_name: health_notifier
    # 🟢 Override คำสั่ง CMD เพื่อให้รันระบบแจ้งเตือนโดยเฉพาะ
    command: ["python", "daily_reminder.py"]
    env_file: .env
    depends_on:
      - backend-api
    restart: always

  # 🎨 Frontend: หน้าเว็บ Streamlit สำหรับให้พยาบาลใช้งาน
  frontend:
    build: .
    container_name: health_frontend
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "frontend/ui.py", "--server.port=8501", "--server.address=0.0.0.0"]
    env_file: .env
    depends_on:
      - backend-api
    restart: always
