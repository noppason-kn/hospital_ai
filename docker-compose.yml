services:
  # 📊 MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    ports:
      - "5001:5000"
    command: >
      mlflow server 
      --backend-store-uri sqlite:////app/mlflow.db 
      --default-artifact-root /app/artifacts 
      --host 0.0.0.0
    volumes:
      - ./mlflow_data:/app
    restart: always

  # 🌐 Backend: FastAPI
  backend-api:
    build: .
    container_name: health_backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DOCKER_ENV=true
      - PYTHONUNBUFFERED=1
    depends_on:
      - mlflow
    restart: always

  # 🔔 Notifier: ระบบแจ้งเตือน LINE (เวอร์ชันที่รันผ่านชัวร์)
  notifier:
    build: .
    container_name: health_notifier
    # 🟢 ตัวนี้แหละครับไม้ตาย! ต้องเปิด Server ทิ้งไว้ข้างหลังด้วย &
    command: |
      bash -c "
      prefect server start --host 0.0.0.0 --port 4200 &
      echo '⏳ Waiting for Prefect Server...'
      until curl -s http://localhost:4200/api/health > /dev/null; do
        sleep 2
      done
      echo '✅ Prefect Server is UP!'
      python daily_reminder.py
      "
    ports:
      - "4200:4200"
    env_file: .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DOCKER_ENV=true
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Bangkok
      - PREFECT_API_URL=http://127.0.0.1:4200/api
      - PREFECT_HOME=/root/.prefect
      - PREFECT_API_DATABASE_CONNECTION_URL=sqlite+aiosqlite:////root/.prefect/prefect.db?timeout=60
    volumes:
      - .:/app
      - prefect_storage:/root/.prefect
    depends_on:
      - backend-api
    restart: always

  # 🎨 Frontend: Streamlit
  frontend:
    build: .
    container_name: health_frontend
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "frontend/ui.py", "--server.port=8501", "--server.address=0.0.0.0"]
    env_file: .env
    depends_on:
      - backend-api
    environment:
      - BACKEND_URL=http://backend-api:8080
      - PYTHONUNBUFFERED=1
    restart: always

volumes:
  prefect_storage: