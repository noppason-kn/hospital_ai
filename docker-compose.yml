services:
  # 📊 MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    ports:
      - "5001:5000"
    command: >
      mlflow server 
      --backend-store-uri sqlite:////app/mlflow.db 
      --default-artifact-root /app/artifacts 
      --host 0.0.0.0
    volumes:
      - ./mlflow_data:/app
    restart: always

  # 🌐 Backend: FastAPI
  backend-api:
    build: .
    container_name: health_backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DOCKER_ENV=true
      - PYTHONUNBUFFERED=1
    depends_on:
      - mlflow
    restart: always

  # 🔔 Notifier: ระบบแจ้งเตือน LINE
  notifier:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: health_notifier
    command: ["python", "daily_reminder.py"]
    env_file: .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DOCKER_ENV=true
      - PYTHONUNBUFFERED=1
      # 🟢 บังคับใช้โหมด Server ถาวรเพื่อแก้คำเตือน Ephemeral
      - PREFECT_SERVER_ALLOW_SCHEDULED_RUNS=true
      - PREFECT_API_SERVICES_SCHEDULER_ENABLED=true
      # 🟢 ไม่ระบุ PREFECT_API_URL เพื่อให้มันใช้ Internal Server ตัวเองได้เสถียรกว่าใน Docker
      # 🟢 แก้ไขปัญหา Database Locked ด้วยการเพิ่ม Timeout เป็น 60 วินาที
      - PREFECT_API_DATABASE_CONNECTION_URL=sqlite+aiosqlite:////root/.prefect/prefect.db?timeout=60
      - PREFECT_HOME=/root/.prefect
    volumes:
      - .:/app
      - prefect_storage:/root/.prefect
    depends_on:
      - backend-api
    restart: always

  # 🎨 Frontend: Streamlit
  frontend:
    build: .
    container_name: health_frontend
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "frontend/ui.py", "--server.port=8501", "--server.address=0.0.0.0"]
    env_file: .env
    depends_on:
      - backend-api
    environment:
      - BACKEND_URL=http://backend-api:8080
      - PYTHONUNBUFFERED=1
    restart: always

# 🟢 ประกาศ Volume ให้ถูกต้อง (ต้องชิดซ้ายสุด)
volumes:
  prefect_storage: