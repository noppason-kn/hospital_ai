services:
  # 📊 MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    ports:
      - "5001:5000"
    command: >
      mlflow server 
      --backend-store-uri sqlite:////app/mlflow.db 
      --default-artifact-root /app/artifacts 
      --host 0.0.0.0
    volumes:
      - ./mlflow_data:/app
    restart: always

  # 🌐 Backend: FastAPI
  backend-api:
    build: .
    container_name: health_backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DOCKER_ENV=true
    depends_on:
      - mlflow
    restart: always

  # 🔔 Notifier: ระบบแจ้งเตือน LINE
  notifier:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: health_notifier
    command: ["python", "daily_reminder.py"]
    env_file: .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DOCKER_ENV=true
      - PREFECT_SERVER_ALLOW_SCHEDULED_RUNS=true
      - PREFECT_API_DATABASE_CONNECTION_URL=sqlite+aiosqlite:////app/prefect.db
    volumes:
      - .:/app
      - prefect_storage:/root/.prefect
    depends_on:
      - backend-api
    restart: always

  # 🎨 Frontend: Streamlit
  frontend:
    build: .
    container_name: health_frontend
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "frontend/ui.py", "--server.port=8501", "--server.address=0.0.0.0"]
    env_file: .env
    depends_on:
      - backend-api
    environment:
      - BACKEND_URL=http://backend-api:8080
    restart: always

# 🟢 บรรทัดนี้สำคัญมาก: ต้องเริ่มที่ขอบซ้ายสุด (Root Level) ห้ามเคาะเว้นวรรคข้างหน้า
volumes:
  prefect_storage: